<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b2f1f"/>
      <stop offset="0.52" stop-color="#14532d"/>
      <stop offset="1" stop-color="#0f2a1d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 460) rotate(90) scale(560 940)">
      <stop stop-color="#d9f99d" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#86efac" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#bbf7d0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="pitchStripe" width="180" height="900" patternUnits="userSpaceOnUse">
      <rect width="90" height="900" fill="rgba(255,255,255,0.035)"/>
      <rect x="90" width="90" height="900" fill="rgba(0,0,0,0.045)"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#pitchStripe)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <g stroke="rgba(255,255,255,0.95)" stroke-width="7" fill="none">
    <rect x="90" y="70" width="1420" height="760" rx="22"/>
    <line x1="800" y1="70" x2="800" y2="830"/>
    <circle cx="800" cy="450" r="118"/>
    <circle cx="800" cy="450" r="4" fill="rgba(255,255,255,0.98)"/>

    <rect x="90" y="255" width="220" height="390"/>
    <rect x="1290" y="255" width="220" height="390"/>
    <rect x="90" y="335" width="90" height="230"/>
    <rect x="1420" y="335" width="90" height="230"/>

    <circle cx="230" cy="450" r="4" fill="rgba(255,255,255,0.98)"/>
    <circle cx="1370" cy="450" r="4" fill="rgba(255,255,255,0.98)"/>

    <path d="M310 380Q390 450 310 520"/>
    <path d="M1290 380Q1210 450 1290 520"/>
  </g>

  <!-- Player silhouette kicking (dynamic side profile) -->
  <g transform="translate(1088 546)">
    <!-- head -->
    <circle cx="108" cy="36" r="18" fill="#F5E6B3"/>

    <!-- torso + hip -->
    <path d="M86 58C98 50 120 50 132 60L140 96L126 126L96 126L80 98L86 58Z" fill="#D4A017"/>

    <!-- back arm -->
    <path d="M82 84L46 104L54 118L88 102" fill="#D4A017"/>

    <!-- front arm -->
    <path d="M132 88L166 110L174 96L142 78" fill="#D4A017"/>

    <!-- planted leg -->
    <path d="M98 124L74 182L94 190L116 136" fill="#B8860B"/>

    <!-- kicking leg (slightly shorter) -->
    <path d="M124 124L166 146L178 130L138 108" fill="#B8860B"/>
    <path d="M166 146L214 156L220 140L176 132" fill="#B8860B"/>

    <!-- kicked ball (2x size) -->
    <circle cx="248" cy="150" r="26" fill="#f8fafc" stroke="rgba(15,23,42,0.85)" stroke-width="3.2"/>
    <path d="M248 134L260 142L256 156H240L236 142L248 134Z" fill="#111827"/>

    <!-- motion trail -->
    <path d="M284 136L326 124" stroke="rgba(255,255,255,0.72)" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M292 154L338 142" stroke="rgba(255,255,255,0.58)" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M300 172L352 160" stroke="rgba(255,255,255,0.45)" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Goalkeeper attentive on opposite goal side, facing the ball -->
  <g transform="translate(1398 388) scale(0.88)">
    <!-- head -->
    <circle cx="42" cy="26" r="13" fill="#F5E6B3"/>

    <!-- torso -->
    <path d="M28 40C36 34 50 34 58 40L62 84L52 116H34L24 84L28 40Z" fill="#4DA3FF"/>

    <!-- left arm (towards ball, slightly raised) -->
    <path d="M24 58L-12 72L-6 86L28 74" fill="#4DA3FF"/>

    <!-- right arm -->
    <path d="M58 58L88 70L82 84L54 74" fill="#4DA3FF"/>

    <!-- legs in ready stance -->
    <path d="M36 116L24 166L40 170L50 120" fill="#2C7FD6"/>
    <path d="M50 116L66 166L82 162L58 118" fill="#2C7FD6"/>

    <!-- gloves -->
    <ellipse cx="-12" cy="78" rx="8" ry="6" fill="#f8fafc"/>
    <ellipse cx="86" cy="76" rx="7" ry="5" fill="#f8fafc"/>
  </g>
</svg>
