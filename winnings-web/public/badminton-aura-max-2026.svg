<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1A26"/>
      <stop offset="0.52" stop-color="#133A5B"/>
      <stop offset="1" stop-color="#1A0C3F"/>
    </linearGradient>

    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(610 290) rotate(90) scale(310 520)">
      <stop stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="courtFill" x1="220" y1="120" x2="940" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E6E49"/>
      <stop offset="1" stop-color="#0E4D39"/>
    </linearGradient>

    <linearGradient id="racketRim" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8F0FF"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>

    <linearGradient id="grip" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F6AD55"/>
      <stop offset="1" stop-color="#8B5A2B"/>
    </linearGradient>

    <filter id="softGlow" x="0" y="0" width="1200" height="675" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#halo)"/>

  <!-- diagonal neon lines to match tennis style -->
  <g opacity="0.45" stroke-linecap="round">
    <path d="M-40 180L1240 40" stroke="#FBBF24" stroke-width="5"/>
    <path d="M-40 250L1240 110" stroke="#22D3EE" stroke-width="6"/>
    <path d="M-20 320L1220 180" stroke="#06B6D4" stroke-width="4"/>
  </g>

  <!-- rotated badminton court (tennis-card vibe) -->
  <g transform="translate(620 310) rotate(-8) translate(-620 -310)">
    <rect x="245" y="120" width="620" height="380" rx="20" fill="url(#courtFill)"/>
    <rect x="245" y="120" width="620" height="380" rx="20" stroke="#EAFBF0" stroke-width="5"/>

    <!-- doubles boundary -->
    <rect x="272" y="144" width="566" height="332" stroke="#EAFBF0" stroke-width="3"/>
    <!-- singles boundary -->
    <rect x="314" y="144" width="482" height="332" stroke="#EAFBF0" stroke-width="2.6" opacity="0.95"/>

    <!-- net + center -->
    <line x1="272" y1="310" x2="838" y2="310" stroke="#FFF6DB" stroke-width="4.4"/>
    <line x1="555" y1="144" x2="555" y2="476" stroke="#EAFBF0" stroke-width="2.6"/>

    <!-- short service lines -->
    <line x1="314" y1="245" x2="796" y2="245" stroke="#EAFBF0" stroke-width="2.6"/>
    <line x1="314" y1="375" x2="796" y2="375" stroke="#EAFBF0" stroke-width="2.6"/>

    <!-- long service lines (doubles) -->
    <line x1="272" y1="178" x2="838" y2="178" stroke="#EAFBF0" stroke-width="2.6"/>
    <line x1="272" y1="442" x2="838" y2="442" stroke="#EAFBF0" stroke-width="2.6"/>
  </g>

  <!-- realistic-ish racket -->
  <g transform="translate(850 190) rotate(14)">
    <ellipse cx="95" cy="105" rx="74" ry="98" fill="#1E293B" fill-opacity="0.34"/>
    <ellipse cx="95" cy="105" rx="68" ry="92" fill="none" stroke="url(#racketRim)" stroke-width="10"/>
    <ellipse cx="95" cy="105" rx="53" ry="75" fill="none" stroke="#CBD5E1" stroke-width="1.8"/>

    <!-- strings -->
    <g stroke="#DDE7F7" stroke-opacity="0.86" stroke-width="1.2">
      <line x1="56" y1="38" x2="56" y2="172"/>
      <line x1="70" y1="26" x2="70" y2="184"/>
      <line x1="84" y1="18" x2="84" y2="192"/>
      <line x1="95" y1="14" x2="95" y2="196"/>
      <line x1="106" y1="18" x2="106" y2="192"/>
      <line x1="120" y1="26" x2="120" y2="184"/>
      <line x1="134" y1="38" x2="134" y2="172"/>

      <line x1="33" y1="70" x2="157" y2="70"/>
      <line x1="28" y1="88" x2="162" y2="88"/>
      <line x1="26" y1="105" x2="164" y2="105"/>
      <line x1="28" y1="122" x2="162" y2="122"/>
      <line x1="33" y1="140" x2="157" y2="140"/>
    </g>

    <rect x="79" y="196" width="32" height="26" rx="8" fill="#94A3B8"/>
    <rect x="84" y="221" width="22" height="138" rx="10" fill="url(#grip)"/>
    <g stroke="#FDE68A" stroke-width="2" opacity="0.85">
      <line x1="85" y1="238" x2="105" y2="250"/>
      <line x1="85" y1="257" x2="105" y2="269"/>
      <line x1="85" y1="276" x2="105" y2="288"/>
      <line x1="85" y1="295" x2="105" y2="307"/>
      <line x1="85" y1="314" x2="105" y2="326"/>
      <line x1="85" y1="333" x2="105" y2="345"/>
    </g>
  </g>

  <!-- realistic-ish shuttlecock -->
  <g transform="translate(760 120) rotate(-26)">
    <ellipse cx="0" cy="2" rx="16" ry="12" fill="#F8FAFC"/>
    <ellipse cx="0" cy="2" rx="10" ry="7" fill="#DDE5EF"/>

    <!-- feather skirt -->
    <path d="M-34 -58L-10 -8" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
    <path d="M-20 -64L-6 -9" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
    <path d="M-6 -68L-2 -10" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
    <path d="M8 -68L2 -10" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
    <path d="M22 -64L6 -9" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
    <path d="M36 -58L10 -8" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>

    <g stroke="#C7D2E4" stroke-width="2" opacity="0.8">
      <line x1="-28" y1="-55" x2="-8" y2="-9"/>
      <line x1="-14" y1="-62" x2="-4" y2="-9"/>
      <line x1="0" y1="-66" x2="0" y2="-9"/>
      <line x1="14" y1="-62" x2="4" y2="-9"/>
      <line x1="28" y1="-55" x2="8" y2="-9"/>
    </g>
  </g>

  <!-- floating spark accents -->
  <g opacity="0.88" filter="url(#softGlow)">
    <circle cx="190" cy="110" r="3" fill="#FDE68A"/>
    <circle cx="1080" cy="120" r="3" fill="#FDE68A"/>
    <circle cx="1010" cy="220" r="2.5" fill="#FDE68A"/>
  </g>

  <text x="70" y="615" fill="#FDE68A" font-family="Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="2">BADMINTON</text>
</svg>
