<svg width="1400" height="840" viewBox="0 0 1400 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#051521"/>
      <stop offset="0.45" stop-color="#10345C"/>
      <stop offset="1" stop-color="#1E0D47"/>
    </linearGradient>
    <clipPath id="racketHead">
      <ellipse cx="120" cy="175" rx="82" ry="108"/>
    </clipPath>
  </defs>

  <rect width="1400" height="840" fill="url(#bg)"/>
  <circle cx="1140" cy="120" r="230" fill="#ffe066" opacity="0.2"/>
  <circle cx="210" cy="720" r="280" fill="#22d3ee" opacity="0.28"/>
  <circle cx="760" cy="110" r="220" fill="#34d399" opacity="0.2"/>

  <path d="M0 185L1400 35" stroke="#ffd400" stroke-opacity="0.4" stroke-width="12"/>
  <path d="M0 265L1400 115" stroke="#00e5ff" stroke-opacity="0.4" stroke-width="12"/>
  <path d="M0 345L1400 195" stroke="#38bdf8" stroke-opacity="0.28" stroke-width="10"/>

  <!-- Court frame (kept in same direction style as tennis card) -->
  <g transform="rotate(-7 525 390)">
    <rect x="110" y="120" width="830" height="540" rx="28" fill="#0a1830" stroke="#8ce99a" stroke-width="4"/>
    <rect x="145" y="160" width="760" height="460" rx="14" fill="#0e3b34"/>

    <!-- Rotate court markings 90deg so perspective matches tennis card -->
    <g transform="rotate(90 525 390)">
      <!-- Doubles outer boundary -->
      <rect x="360" y="40" width="330" height="700" fill="none" stroke="#eaffea" stroke-width="4"/>

      <!-- Singles sidelines (0.46m in from each doubles sideline) -->
      <line x1="385" y1="40" x2="385" y2="740" stroke="#eaffea" stroke-width="3"/>
      <line x1="665" y1="40" x2="665" y2="740" stroke="#eaffea" stroke-width="3"/>

      <!-- Net line (middle of court length) -->
      <line x1="360" y1="390" x2="690" y2="390" stroke="#fff8dc" stroke-width="4"/>

      <!-- Short service lines (1.98m from net each side, scaled) -->
      <line x1="385" y1="286" x2="665" y2="286" stroke="#eaffea" stroke-width="3"/>
      <line x1="385" y1="494" x2="665" y2="494" stroke="#eaffea" stroke-width="3"/>

      <!-- Long service lines for doubles (0.76m in from back boundary, scaled) -->
      <line x1="360" y1="80" x2="690" y2="80" stroke="#eaffea" stroke-width="3"/>
      <line x1="360" y1="700" x2="690" y2="700" stroke="#eaffea" stroke-width="3"/>

      <!-- Center service line (official: does not touch net; runs short-service to long-service on each half) -->
      <line x1="525" y1="80" x2="525" y2="286" stroke="#eaffea" stroke-width="3"/>
      <line x1="525" y1="494" x2="525" y2="700" stroke="#eaffea" stroke-width="3"/>

      <!-- Net band + mesh (same direction style as tennis net) -->
      <rect x="360" y="384" width="330" height="12" fill="#f8fafc"/>
      <path d="M360 384H690M360 388H690M360 392H690M360 396H690" stroke="#cbd5e1" stroke-width="1.2"/>
      <path d="M384 382V398M414 382V398M444 382V398M474 382V398M504 382V398M534 382V398M564 382V398M594 382V398M624 382V398M654 382V398" stroke="#e2e8f0" stroke-width="1.2"/>
      <rect x="354" y="368" width="8" height="44" rx="3" fill="#d1d5db"/>
      <rect x="688" y="368" width="8" height="44" rx="3" fill="#d1d5db"/>
    </g>
  </g>

  <!-- Racket -->
  <g transform="translate(965 160) rotate(17)">
    <ellipse cx="120" cy="175" rx="92" ry="118" fill="none" stroke="#f8fafc" stroke-width="12"/>
    <g clip-path="url(#racketHead)">
      <path d="M52 72V278M74 66V284M96 60V290M120 58V292M144 60V290M166 66V284M188 72V278" stroke="#dbe7f5" stroke-width="2"/>
      <path d="M38 108H202M34 136H206M32 166H208M34 196H206M38 224H202" stroke="#dbe7f5" stroke-width="2"/>
    </g>
    <path d="M52 248C72 270 92 294 112 334" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M188 248C168 270 148 294 128 334" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none"/>
    <rect x="108" y="334" width="24" height="132" rx="12" fill="#c08444"/>
    <path d="M110 352L130 364M110 374L130 386M110 396L130 408M110 418L130 430" stroke="#fde68a" stroke-width="2"/>
  </g>

  <!-- Shuttlecock -->
  <g transform="translate(1125 230) rotate(-22)">
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#f8fafc"/>
    <ellipse cx="0" cy="0" rx="9" ry="6" fill="#dbe5f0"/>
    <path d="M-36 -64L-10 -8" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <path d="M-22 -70L-5 -8" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <path d="M-7 -74L-2 -8" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <path d="M8 -74L2 -8" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <path d="M23 -70L5 -8" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <path d="M37 -64L10 -8" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
