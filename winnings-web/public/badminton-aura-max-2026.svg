<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04140F"/>
      <stop offset="0.55" stop-color="#0D3A2A"/>
      <stop offset="1" stop-color="#041A24"/>
    </linearGradient>

    <radialGradient id="spot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(620 295) rotate(90) scale(280 430)">
      <stop stop-color="#34D399" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="courtFill" x1="230" y1="115" x2="970" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B5D3D"/>
      <stop offset="1" stop-color="#0A3F31"/>
    </linearGradient>

    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="glow" x="0" y="0" width="1200" height="675" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#spot)"/>

  <!-- official-style badminton court -->
  <g transform="translate(150 70)">
    <rect x="80" y="40" width="740" height="500" rx="20" fill="url(#courtFill)"/>
    <rect x="80" y="40" width="740" height="500" rx="20" stroke="#E8F7E8" stroke-opacity="0.85" stroke-width="6"/>

    <!-- sideline singles/doubles -->
    <rect x="120" y="70" width="660" height="440" stroke="#E8F7E8" stroke-width="4"/>
    <rect x="170" y="70" width="560" height="440" stroke="#E8F7E8" stroke-width="3" opacity="0.9"/>

    <!-- short service lines -->
    <line x1="170" y1="210" x2="730" y2="210" stroke="#E8F7E8" stroke-width="3"/>
    <line x1="170" y1="370" x2="730" y2="370" stroke="#E8F7E8" stroke-width="3"/>

    <!-- center + net line -->
    <line x1="450" y1="70" x2="450" y2="510" stroke="#E8F7E8" stroke-width="3"/>
    <line x1="120" y1="290" x2="780" y2="290" stroke="#FFF8DC" stroke-width="5"/>

    <!-- back service lines for doubles -->
    <line x1="120" y1="115" x2="780" y2="115" stroke="#E8F7E8" stroke-width="3"/>
    <line x1="120" y1="465" x2="780" y2="465" stroke="#E8F7E8" stroke-width="3"/>
  </g>

  <!-- racket -->
  <g transform="translate(840 160) rotate(18)">
    <ellipse cx="120" cy="130" rx="90" ry="120" fill="none" stroke="url(#rim)" stroke-width="14"/>
    <ellipse cx="120" cy="130" rx="72" ry="98" fill="none" stroke="#F8FAFC" stroke-opacity="0.9" stroke-width="2"/>

    <!-- strings -->
    <g stroke="#E2E8F0" stroke-opacity="0.75" stroke-width="1.6">
      <line x1="60" y1="50" x2="60" y2="210"/>
      <line x1="80" y1="38" x2="80" y2="222"/>
      <line x1="100" y1="30" x2="100" y2="230"/>
      <line x1="120" y1="26" x2="120" y2="234"/>
      <line x1="140" y1="30" x2="140" y2="230"/>
      <line x1="160" y1="38" x2="160" y2="222"/>
      <line x1="180" y1="50" x2="180" y2="210"/>

      <line x1="42" y1="82" x2="198" y2="82"/>
      <line x1="34" y1="106" x2="206" y2="106"/>
      <line x1="30" y1="130" x2="210" y2="130"/>
      <line x1="34" y1="154" x2="206" y2="154"/>
      <line x1="42" y1="178" x2="198" y2="178"/>
    </g>

    <rect x="96" y="238" width="48" height="36" rx="12" fill="#CBD5E1"/>
    <path d="M120 272L120 420" stroke="#A16207" stroke-width="24" stroke-linecap="round"/>
    <path d="M120 332L120 420" stroke="#FDE68A" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- shuttlecock -->
  <g transform="translate(760 120) rotate(-20)">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="#F8FAFC"/>
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#E2E8F0"/>
    <path d="M-40 -70L-10 -14" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
    <path d="M0 -78L0 -16" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
    <path d="M40 -70L10 -14" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
    <path d="M-27 -74L-6 -15" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>
    <path d="M27 -74L6 -15" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- light accents -->
  <g opacity="0.8" filter="url(#glow)">
    <circle cx="200" cy="90" r="3" fill="#FDE68A"/>
    <circle cx="260" cy="140" r="2.5" fill="#FDE68A"/>
    <circle cx="1080" cy="130" r="3" fill="#FDE68A"/>
    <circle cx="1020" cy="220" r="2.5" fill="#FDE68A"/>
  </g>

  <text x="70" y="620" fill="#FDE68A" font-family="Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="2">BADMINTON</text>
</svg>
