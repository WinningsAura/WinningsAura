<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Formula 1 themed background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.5" stop-color="#121A33"/>
      <stop offset="1" stop-color="#1A1F3D"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FDE68A" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#EF4444" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 300) rotate(140) scale(520 260)">
      <stop stop-color="#FBBF24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="100" y="640" width="1400" height="18" rx="9" fill="url(#streak)"/>
  <rect x="40" y="585" width="1360" height="10" rx="5" fill="url(#streak)" opacity="0.9"/>
  <rect x="210" y="706" width="1260" height="8" rx="4" fill="url(#streak)" opacity="0.75"/>

  <circle cx="1240" cy="300" r="390" fill="url(#glow)"/>

  <!-- Stylized F1 car silhouette -->
  <g opacity="0.95">
    <rect x="430" y="470" width="620" height="58" rx="22" fill="#0F172A" stroke="#FDE68A" stroke-opacity="0.35"/>
    <path d="M550 470L655 400H850L950 470H550Z" fill="#111827" stroke="#FDE68A" stroke-opacity="0.35"/>
    <rect x="695" y="365" width="110" height="42" rx="10" fill="#0B1227" stroke="#FDE68A" stroke-opacity="0.3"/>
    <rect x="400" y="500" width="95" height="35" rx="10" fill="#111827"/>
    <rect x="985" y="500" width="125" height="35" rx="10" fill="#111827"/>

    <circle cx="560" cy="555" r="88" fill="#020617"/>
    <circle cx="560" cy="555" r="56" fill="#111827" stroke="#9CA3AF" stroke-opacity="0.45"/>
    <circle cx="980" cy="555" r="88" fill="#020617"/>
    <circle cx="980" cy="555" r="56" fill="#111827" stroke="#9CA3AF" stroke-opacity="0.45"/>

    <rect x="765" y="420" width="24" height="105" rx="9" fill="#F59E0B"/>
    <rect x="736" y="447" width="82" height="13" rx="6.5" fill="#EF4444" opacity="0.85"/>
  </g>

  <!-- subtle checker motif -->
  <g opacity="0.16" transform="translate(1180 90)">
    <rect width="44" height="44" fill="#E5E7EB"/>
    <rect x="44" width="44" height="44" fill="#111827"/>
    <rect y="44" width="44" height="44" fill="#111827"/>
    <rect x="44" y="44" width="44" height="44" fill="#E5E7EB"/>

    <rect x="88" width="44" height="44" fill="#E5E7EB"/>
    <rect x="132" width="44" height="44" fill="#111827"/>
    <rect x="88" y="44" width="44" height="44" fill="#111827"/>
    <rect x="132" y="44" width="44" height="44" fill="#E5E7EB"/>
  </g>
</svg>
